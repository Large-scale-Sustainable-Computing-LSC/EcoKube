apiVersion: apps/v1
kind: Deployment
metadata:
  name: forecastservice
  namespace: ci-aware
spec:
  replicas: 1
  selector: { matchLabels: { app: forecastservice } }
  template:
    metadata: { labels: { app: forecastservice } }
    spec:
      containers:
        - name: svc
          image: ghcr.io/yourorg/forecastservice:stub
          args: ["--sites", "/etc/ci-aware/sites.json", "--mode=static"]
          ports: [{ name: metrics, containerPort: 9100 }]
          volumeMounts:
            - { name: sites, mountPath: /etc/ci-aware }
      volumes:
        - name: sites
          configMap: { name: site-params }
---
apiVersion: v1
kind: Service
metadata: { name: forecastservice, namespace: ci-aware, labels: { app: forecastservice } }
spec:
  selector: { app: forecastservice }
  ports:
    - name: metrics
      port: 9100
      targetPort: metrics
