server:
  service:
    type: ClusterIP
    port: 9090
  ingress:
    enabled: false

alertmanager:
  enabled: false

prometheus:
  prometheusSpec:
    podMonitorSelector:
      matchLabels:
        release: eu-cluster


serviceMonitors:
  enabled: true
podMonitors:
  enabled: true

additionalScrapeConfigs:
  - job_name: 'scaphandre'
    kubernetes_sd_configs: [{role: pod}]
    relabel_configs:
      - action: keep
        source_labels: [__meta_kubernetes_pod_label_app]
        regex: scaphandre
      - action: replace
        source_labels: [__meta_kubernetes_pod_node_name]
        target_label: node
      - action: replace
        source_labels: [__meta_kubernetes_node_label_site]
        target_label: site
  - job_name: 'forecastservice'
    kubernetes_sd_configs: [{ role: endpoints }]
    relabel_configs:
      - action: keep
        source_labels: [__meta_kubernetes_service_label_app]
        regex: forecastservice
      - action: replace
        source_labels: [__meta_kubernetes_node_label_site]
        target_label: site


