kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            system-reserved: cpu=200m,memory=512Mi
    labels:
      site: B
  - role: worker
    labels:
      site: A
  - role: worker
    labels:
      site: C
